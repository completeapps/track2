<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track & Jump Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .hidden { display: none !important; }

    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 4px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .tagline {
      text-align: center;
      color: rgba(255,255,255,0.9);
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 18px 35px rgba(0,0,0,0.18);
      padding: 24px;
      margin-bottom: 20px;
    }

    .auth-card { max-width: 420px; margin: 0 auto 24px; }

    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #4b5563;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.2);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .btn {
      flex: 1;
      min-width: 120px;
      padding: 12px 16px;
      border-radius: 9999px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
    }
    .btn-outline {
      background: #fff;
      color: #4b5563;
      border: 1px solid #e5e7eb;
    }
    .btn-google {
      background: #fff;
      color: #374151;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-danger {
      background: #ef4444;
      color: #fff;
    }
    .btn-full { width: 100%; }
    .btn-small {
      padding: 6px 12px;
      min-width: auto;
      font-size: 13px;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .small-text {
      font-size: 13px;
      color: #6b7280;
      margin-top: 10px;
    }
    .error-text {
      color: #ef4444;
      font-size: 13px;
      margin-top: 6px;
    }

    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-radius: 9999px;
      background: rgba(15,23,42,0.9);
      color: #e5e7eb;
      margin-bottom: 16px;
    }
    .user-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-pill {
      padding: 6px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      background: #22c55e;
      color: #022c22;
    }

    .subheading {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 18px;
      color: #111827;
    }

    .entry-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 320px;
      overflow-y: auto;
    }
    .entry-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border-radius: 14px;
      background: #f9fafb;
      box-shadow: 0 2px 6px rgba(15,23,42,0.08);
    }
    .entry-main { flex: 1; }
    .entry-heading {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 2px;
    }
    .entry-value {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }
    .entry-notes {
      font-size: 13px;
      color: #4b5563;
    }

    .stats {
      background: linear-gradient(135deg, #dbeafe 0%, #f5f3ff 100%);
      border-radius: 16px;
      padding: 18px;
      margin-top: 12px;
    }
    .stats h3 {
      margin: 0 0 8px;
      font-size: 16px;
      color: #111827;
    }
    .stats-text {
      font-size: 14px;
      color: #4b5563;
    }

    .chart-wrap {
      margin-top: 16px;
      padding: 12px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(15,23,42,0.12);
    }
    #progressChart {
      width: 100%;
      max-height: 320px;
    }

    @media (max-width: 640px) {
      .card { padding: 18px; }
      .user-bar { flex-direction: column; gap: 8px; align-items: flex-start; }
      .btn-row { flex-direction: column; }
      .btn-google { justify-content: center; }
    }
  </style>

  <!-- Firebase v10+ modules -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      GoogleAuthProvider,
      signInWithPopup
    } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
    import {
      getDatabase,
      ref,
      onValue,
      set
    } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js';
    import 'https://cdn.jsdelivr.net/npm/chart.js';  // Chart.js global [web:49]

    const firebaseConfig = {
      apiKey: "AIzaSyDWhov-JJ2xQBMX2JGVSHIBBYlcBz8fVW8",
      authDomain: "track2-14f71.firebaseapp.com",
      databaseURL: "https://track2-14f71-default-rtdb.firebaseio.com",
      projectId: "track2-14f71",
      storageBucket: "track2-14f71.firebasestorage.app",
      messagingSenderId: "705635088275",
      appId: "1:705635088275:web:1a585c9102424238725a66",
      measurementId: "G-SKJYDF75M3"
    };

    const app = initializeApp(firebaseConfig);        // [web:50]
    const auth = getAuth(app);                        // [web:50]
    const db = getDatabase(app);                      // [web:41]
    const googleProvider = new GoogleAuthProvider();  // [web:61]

    // DOM
    const authScreen   = document.getElementById('authScreen');
    const appScreen    = document.getElementById('appScreen');
    const authEmail    = document.getElementById('authEmail');
    const authPassword = document.getElementById('authPassword');
    const authError    = document.getElementById('authError');
    const userEmailEl  = document.getElementById('userEmail');
    const syncStatus   = document.getElementById('syncStatus');

    const btnSignUp    = document.getElementById('btnSignUp');
    const btnSignIn    = document.getElementById('btnSignIn');
    const btnGoogle    = document.getElementById('btnGoogle');
    const btnLogout    = document.getElementById('btnLogout');

    const entryForm    = document.getElementById('entryForm');
    const dateInput    = document.getElementById('date');
    const eventInput   = document.getElementById('event');
    const valueInput   = document.getElementById('value');
    const notesInput   = document.getElementById('notes');
    const entriesList  = document.getElementById('entriesList');
    const statsContent = document.getElementById('statsContent');
    const chartCanvas  = document.getElementById('progressChart');

    let entries = [];
    let entriesRef = null;
    let chart = null;

    dateInput.value = new Date().toISOString().split('T')[0];

    function setSync(text, color) {
      syncStatus.textContent = text;
      syncStatus.style.background = color;
    }

    // Email/password buttons
    btnSignUp.addEventListener('click', async () => {
      authError.textContent = '';
      try {
        await createUserWithEmailAndPassword(auth, authEmail.value, authPassword.value);
      } catch (err) {
        authError.textContent = err.message;
      }
    });

    btnSignIn.addEventListener('click', async () => {
      authError.textContent = '';
      try {
        await signInWithEmailAndPassword(auth, authEmail.value, authPassword.value);
      } catch (err) {
        authError.textContent = err.message;
      }
    });

    // Google sign-in button
    btnGoogle.addEventListener('click', async () => {
      authError.textContent = '';
      try {
        await signInWithPopup(auth, googleProvider);  // opens Google popup [web:61]
      } catch (err) {
        authError.textContent = err.message;
      }
    });

    btnLogout.addEventListener('click', async () => {
      await signOut(auth);
    });

    // Auth state listener
    onAuthStateChanged(auth, (user) => {
      if (user) {
        authScreen.classList.add('hidden');
        appScreen.classList.remove('hidden');
        userEmailEl.textContent = user.email || '(no email)';
        setSync('Syncing…', '#facc15');

        entriesRef = ref(db, `users/${user.uid}/entries`);
        onValue(entriesRef, (snapshot) => {
          const data = snapshot.val();
          entries = data ? Object.values(data) : [];
          setSync('Synced', '#22c55e');
          renderEntries();
        });
      } else {
        appScreen.classList.add('hidden');
        authScreen.classList.remove('hidden');
      }
    });

    // Form submit
    entryForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!entriesRef) return;

      const entry = {
        date: dateInput.value,
        event: eventInput.value,
        value: valueInput.value.trim(),
        notes: notesInput.value.trim()
      };
      if (!entry.date || !entry.event || !entry.value) return;

      entries.unshift(entry);
      saveEntries();
      dateInput.value = new Date().toISOString().split('T')[0];
      eventInput.value = '';
      valueInput.value = '';
      notesInput.value = '';
    });

    function saveEntries() {
      if (!entriesRef) return;
      const obj = {};
      entries.forEach((e, i) => { obj[i] = e; });
      set(entriesRef, obj);
      setSync('Saving…', '#f97316');
    }

    function numeric(val) {
      const n = parseFloat(String(val).replace(/[^\d.]/g, ''));
      return isNaN(n) ? null : n;
    }

    function isBetter(newVal, oldVal, event) {
      const nNew = numeric(newVal);
      const nOld = numeric(oldVal);
      if (nNew === null || nOld === null) return false;
      if (event === 'Long Jump') return nNew > nOld;
      return nNew < nOld;
    }

    function renderStats() {
      if (!entries.length) {
        statsContent.textContent = 'No entries yet. Log something to see your PRs.';
        return;
      }
      const pb = {};
      entries.forEach(e => {
        if (!pb[e.event] || isBetter(e.value, pb[e.event].value, e.event)) {
          pb[e.event] = e;
        }
      });
      const lines = [];
      for (const ev in pb) {
        lines.push(`${ev}: ${pb[ev].value} on ${pb[ev].date}`);
      }
      statsContent.textContent = lines.join(' | ');
    }

    function renderChart() {
      const ctx = chartCanvas.getContext('2d');
      if (chart) chart.destroy();

      const eventData = {};
      entries.forEach(e => {
        if (!eventData[e.event]) eventData[e.event] = [];
        const val = numeric(e.value);
        if (val !== null) {
          eventData[e.event].push({ date: new Date(e.date), value: val });
        }
      });

      if (!Object.keys(eventData).length) {
        chart = new Chart(ctx, {
          type: 'line',
          data: { labels: [], datasets: [] },
          options: { plugins: { title: { display: true, text: 'Log entries to see your progress' } } }
        });
        return;
      }

      const datasets = Object.keys(eventData).map(ev => {
        const sorted = eventData[ev].sort((a,b)=> a.date - b.date);
        return {
          label: ev,
          data: sorted.map(p => p.value),
          borderColor: ev === '100m' ? '#ef4444' : ev === '200m' ? '#3b82f6' : '#10b981',
          backgroundColor: 'rgba(0,0,0,0.05)',
          fill: true,
          tension: 0.35,
          pointRadius: 4
        };
      });
      const labels = datasets[0].data.map((_, i) => `Session ${i+1}`);
      const needsReverse = datasets.some(ds => ds.label !== 'Long Jump');

      chart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              reverse: needsReverse,
              title: { display: true, text: 'Performance (↓ better for sprints, ↑ for jumps)' }
            },
            x: { title: { display: true, text: 'Sessions' } }
          },
          plugins: {
            legend: { position: 'top' },
            title: { display: true, text: 'Progress over time' }
          },
          interaction: { mode: 'index', intersect: false }
        }
      });
    }

    function renderEntries() {
      entriesList.innerHTML = '';
      entries.forEach((e, i) => {
        const li = document.createElement('li');
        li.className = 'entry-item';
        li.innerHTML = `
          <div class="entry-main">
            <div class="entry-heading">${e.date} • ${e.event}</div>
            <div class="entry-value">${e.value}</div>
            <div class="entry-notes">${e.notes || ''}</div>
          </div>
          <button class="btn btn-danger btn-small">Delete</button>
        `;
        li.querySelector('button').addEventListener('click', () => {
          entries.splice(i, 1);
          saveEntries();
          renderEntries();
        });
        entriesList.appendChild(li);
      });
      renderStats();
      renderChart();
    }
  </script>
</head>
<body>
  <h1>Track & Jump Tracker</h1>
  <p class="tagline">Email or Google login • Personal data • Progress charts</p>

  <!-- AUTH CARD -->
  <div id="authScreen" class="card auth-card">
    <div class="form-group">
      <label for="authEmail">Email</label>
      <input type="email" id="authEmail" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="authPassword">Password</label>
      <input type="password" id="authPassword" placeholder="••••••••">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnSignUp">Create account</button>
      <button class="btn btn-outline" id="btnSignIn">Sign in</button>
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button class="btn btn-google" id="btnGoogle">
        <span>🔑</span> <span>Sign in with Google</span>
      </button>
    </div>
    <p class="small-text">
      Share this URL with your friends. Each account only sees their own data.
    </p>
    <p id="authError" class="error-text"></p>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" class="hidden">
    <div class="user-bar">
      <div>Logged in as <strong id="userEmail"></strong></div>
      <div class="user-bar-right">
        <span id="syncStatus" class="status-pill">Connecting…</span>
        <button class="btn btn-danger btn-small" id="btnLogout">Log out</button>
      </div>
    </div>

    <div class="card">
      <form id="entryForm">
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="event">Event</label>
          <select id="event">
            <option value="">Select event</option>
            <option value="100m">100m (goal: 12.0s)</option>
            <option value="200m">200m (goal: 25s)</option>
            <option value="Long Jump">Long Jump</option>
          </select>
        </div>
        <div class="form-group">
          <label for="value">Time / Distance</label>
          <input type="text" id="value" placeholder="13.0s or 4.5m">
        </div>
        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" rows="2" placeholder="How it felt, conditions, etc."></textarea>
        </div>
        <button class="btn btn-primary btn-full" type="submit">Save entry</button>
      </form>
    </div>

    <div class="card">
      <h2 class="subheading">Recent sessions</h2>
      <ul id="entriesList" class="entry-list"></ul>

      <div id="stats" class="stats">
        <h3>Personal bests</h3>
        <div id="statsContent" class="stats-text">No entries yet.</div>
      </div>

      <div class="chart-wrap">
        <canvas id="progressChart"></canvas>
      </div>
    </div>
  </div>
</body>
</html>
